name: HM_neuron
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.13  # 3.10 is usually the safest for neuro-tools
  - numpy<2.0    # Force 1.x if your tools aren't ready for 2.0
  - pytorch
  - scipy
  - matplotlib
  - pandas
  - pyqt=6       # Pick ONE Qt provider
  - pip
  - pip:
    - spikeinterface[full]
    - kilosort==4.1.2
    - neuroconv
    - ephyviewer